upstream xuanxue_backend {
    server 127.0.0.1:8002;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    root /home/alfred/multiproject/xuanxue/xuanxue-web/frontend;
    index index.html;

    client_max_body_size 20m;

    access_log /var/log/nginx/xuanxue.access.log;
    error_log /var/log/nginx/xuanxue.error.log warn;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /AI配置指南.md {
        alias /home/alfred/multiproject/xuanxue/AI配置指南.md;
        default_type text/markdown;
    }

    location /api/ {
        proxy_pass http://xuanxue_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }

    location = /docs {
        proxy_pass http://xuanxue_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Request-Id $request_id;
    }

    location = /openapi.json {
        proxy_pass http://xuanxue_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Request-Id $request_id;
    }

    location ~* \.(css|js)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    location ~* \.(html|md)$ {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
