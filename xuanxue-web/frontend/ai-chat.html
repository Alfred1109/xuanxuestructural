<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI玄学助手 - 智能对话</title>
    <link rel="stylesheet" href="common-header.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .ai-status {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .ai-status.available {
            border-left: 4px solid #4caf50;
        }

        .ai-status.unavailable {
            border-left: 4px solid #ff9800;
        }

        .ai-status-text {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot.green {
            background: #4caf50;
        }

        .status-dot.orange {
            background: #ff9800;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            height: 600px;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            border-radius: 15px 15px 0 0;
            text-align: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .message.ai .message-avatar {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px 15px 0 15px;
        }

        .message.ai .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-radius: 15px 15px 15px 0;
        }

        .message-time {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .chat-input-area {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            background: white;
            border-radius: 0 0 15px 15px;
        }

        .chat-input-form {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .send-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .typing-indicator {
            display: none;
            padding: 10px 16px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 15px;
            width: fit-content;
        }

        .typing-indicator.show {
            display: block;
        }

        .typing-dots {
            display: flex;
            gap: 5px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .quick-questions {
            padding: 15px 20px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
        }

        .quick-questions-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .quick-question-btn {
            display: inline-block;
            padding: 8px 15px;
            margin: 5px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .quick-question-btn:hover {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-color: transparent;
        }

        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .welcome-message h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .error-message {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 20px;
            color: #856404;
        }
    </style>
</head>
<body>
    <!-- 统一的顶部通栏 -->
    <div class="unified-header">
        <div class="container">
            <div class="site-title">
                <h1>🔮 玄学预测系统</h1>
                <p>传统命理学 · 现代科技 · 智能分析</p>
            </div>
            <nav class="unified-nav">
                <a href="index.html">八字排盘</a>
                <a href="liuyao.html">六爻占卜</a>
                <a href="qimen.html">奇门遁甲</a>
                <a href="zeri.html">择日学</a>
                <a href="ai-chat.html" class="active">🤖 AI助手</a>
                <a href="http://localhost:8004" target="_blank">📚 知识库</a>
            </nav>
        </div>
    </div>

    <div class="container">

        <div class="ai-status" id="aiStatus">
            <div class="ai-status-text">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">正在检查AI服务状态...</span>
            </div>
            <span id="statusModel"></span>
        </div>

        <div class="chat-container">
            <div class="chat-header">
                <h2>💬 与AI对话</h2>
                <p style="font-size: 14px; opacity: 0.9; margin-top: 5px;">询问任何玄学相关的问题</p>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="welcome-message">
                    <h3>👋 欢迎使用AI智能助手</h3>
                    <p>我可以回答关于八字命理、六爻占卜、奇门遁甲、择日学等玄学知识的问题。</p>
                    <p style="margin-top: 10px;">请在下方输入您的问题，或点击快捷问题开始对话。</p>
                </div>
            </div>

            <div class="quick-questions">
                <div class="quick-questions-title">💡 快捷问题：</div>
                <button class="quick-question-btn" onclick="askQuestion('什么是八字命理？')">什么是八字命理？</button>
                <button class="quick-question-btn" onclick="askQuestion('如何看自己的五行属性？')">如何看自己的五行属性？</button>
                <button class="quick-question-btn" onclick="askQuestion('六爻占卜准确吗？')">六爻占卜准确吗？</button>
                <button class="quick-question-btn" onclick="askQuestion('奇门遁甲是什么？')">奇门遁甲是什么？</button>
                <button class="quick-question-btn" onclick="askQuestion('如何选择吉日？')">如何选择吉日？</button>
            </div>

            <div class="chat-input-area">
                <form class="chat-input-form" id="chatForm">
                    <input 
                        type="text" 
                        class="chat-input" 
                        id="chatInput" 
                        placeholder="输入您的问题..." 
                        autocomplete="off"
                        required
                    >
                    <button type="submit" class="send-btn" id="sendBtn">发送</button>
                </form>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="markdown.js"></script>
    <script src="api-client.js"></script>
    <script src="ai-status.js"></script>
    <script>
        const renderMarkdown = (text) => window.renderMarkdownSimple(text, '#f5576c');
        function isConnectivityError(error) {
            const msg = String((error && error.message) || '');
            return msg.includes('Failed to fetch') || msg.includes('NetworkError') || msg.includes('无法连接');
        }

        // 添加消息到聊天窗口
        function addMessage(content, isUser = false) {
            const messagesDiv = document.getElementById('chatMessages');
            const welcomeMsg = messagesDiv.querySelector('.welcome-message');
            if (welcomeMsg) {
                welcomeMsg.remove();
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;
            
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = isUser ? '👤' : '🤖';

            const bodyWrap = document.createElement('div');
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            if (isUser) {
                contentDiv.textContent = content;
            } else {
                contentDiv.innerHTML = renderMarkdown(content);
            }

            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            timeDiv.textContent = time;

            bodyWrap.appendChild(contentDiv);
            bodyWrap.appendChild(timeDiv);
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(bodyWrap);
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // 添加系统消息
        function addSystemMessage(content) {
            const messagesDiv = document.getElementById('chatMessages');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = content;
            messagesDiv.appendChild(errorDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        const chatAIMonitor = window.createAIStatusMonitor({
            bannerId: 'aiStatus',
            dotId: 'statusDot',
            textId: 'statusText',
            detailId: 'statusModel',
            intervalMs: 30000,
            renderStatus: function (state, data, _previous, elements) {
                elements.banner.className = 'ai-status unavailable';
                elements.dot.className = 'status-dot orange';
                elements.detail.textContent = '';

                if (state === 'available') {
                    elements.banner.className = 'ai-status available';
                    elements.dot.className = 'status-dot green';
                    elements.text.textContent = 'AI服务正常';
                    elements.detail.textContent = data && data.model ? `模型: ${data.model}` : '模型信息不可用';
                } else if (state === 'degraded') {
                    elements.text.textContent = 'AI服务波动中';
                    elements.detail.textContent = data && data.message ? data.message : '系统将自动重试';
                } else if (state === 'unconfigured') {
                    elements.text.textContent = 'AI服务未配置';
                    elements.detail.textContent = '请配置ARK_API_KEY';
                } else {
                    elements.text.textContent = '无法连接到后端服务';
                    elements.detail.textContent = '请检查后端进程与端口';
                }
            },
            onTransition: function (state) {
                if (state === 'unconfigured') {
                    addSystemMessage('⚠️ AI服务未配置。如需使用AI功能，请参考《AI配置指南.md》设置ARK_API_KEY环境变量。');
                } else if (state === 'offline') {
                    addSystemMessage('❌ 无法连接到后端服务。请确保后端已启动（运行 ./start.sh）。');
                } else if (state === 'degraded') {
                    addSystemMessage('⚠️ AI服务当前波动，已自动降级为基础解读。');
                }
            }
        });

        // 显示输入中指示器
        function showTypingIndicator() {
            const messagesDiv = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="typing-indicator show">
                    <div class="typing-dots">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // 隐藏输入中指示器
        function hideTypingIndicator() {
            const typingDiv = document.getElementById('typingIndicator');
            if (typingDiv) {
                typingDiv.remove();
            }
        }

        // 发送问题
        async function askQuestion(question) {
            if (!question.trim()) return;
            
            // 如果是通过快捷按钮调用，设置输入框的值
            if (typeof question === 'string') {
                document.getElementById('chatInput').value = question;
            }
            
            // 添加用户消息
            addMessage(question, true);
            
            // 清空输入框
            document.getElementById('chatInput').value = '';
            
            // 禁用发送按钮
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            sendBtn.textContent = '发送中...';
            
            // 显示输入中指示器
            showTypingIndicator();
            
            try {
                const result = await window.apiClient.post('/api/ai/chat', { question });
                
                hideTypingIndicator();
                
                if (result && result.data && result.data.answer) {
                    addMessage(result.data.answer, false);
                } else {
                    addSystemMessage('❌ AI返回内容为空，请稍后重试');
                }
            } catch (error) {
                hideTypingIndicator();
                if (error.message.includes('AI服务暂时不可用')) {
                    chatAIMonitor.applyState('degraded', { message: error.message });
                } else if (error.message.includes('AI服务未配置')) {
                    chatAIMonitor.applyState('unconfigured', { message: error.message });
                } else if (isConnectivityError(error)) {
                    chatAIMonitor.applyState('offline');
                }
                addSystemMessage('❌ 请求失败: ' + error.message + '\n\n请确保：\n1. 后端服务已启动\n2. 已配置ARK_API_KEY环境变量');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = '发送';
            }
        }

        // 表单提交
        document.getElementById('chatForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('chatInput');
            const question = input.value.trim();
            if (question) {
                askQuestion(question);
            }
        });

        chatAIMonitor.start();
    </script>
</body>
</html>
