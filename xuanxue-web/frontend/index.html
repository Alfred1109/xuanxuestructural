<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄学预测系统 - 八字排盘</title>
    <link rel="stylesheet" href="common-header.css">
    <link rel="stylesheet" href="common-theme.css">
    <style>
        .page-title {
            margin-bottom: 18px;
            color: #1f5f8b;
        }

        .btn-row .btn {
            flex: 1;
        }

        .bazi-display {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 14px 0;
        }

        .pillar {
            background: linear-gradient(135deg, #2a6c8a 0%, #1f5f8b 100%);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            color: #fff;
        }

        .pillar-title {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .pillar-content {
            font-size: 29px;
            font-weight: bold;
        }

        .wuxing-chart {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 12px 0;
        }

        .wuxing-item {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
        }

        .wuxing-item .count {
            font-size: 23px;
            margin-top: 4px;
        }

        .wuxing-wood { background: #3d8653; }
        .wuxing-fire { background: #b95040; }
        .wuxing-earth { background: #c7913a; }
        .wuxing-metal { background: #65788a; }
        .wuxing-water { background: #2f76a1; }

        .dayun-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
        }

        .dayun-item {
            background: #f9fcff;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #d4e4f0;
        }

        .dayun-ganzhi {
            font-size: 19px;
            font-weight: 700;
            margin-bottom: 4px;
            color: #1f5f8b;
        }

        .dayun-age {
            color: #4b6074;
            font-size: 13px;
        }

        .shishen-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 8px;
        }

        .shishen-item {
            background: #fff;
            border: 1px solid #d7e1ea;
            border-radius: 8px;
            padding: 10px 12px;
        }

        .ai-status-inline {
            justify-content: space-between;
            display: none;
            align-items: center;
        }

        .ai-status-main {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .ai-analysis-content {
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .light-note {
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .bazi-display,
            .wuxing-chart {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- 统一的顶部通栏 -->
    <div class="unified-header">
        <div class="container">
            <div class="site-title">
                <h1>🔮 玄学预测系统</h1>
                <p>传统命理学 · 现代科技 · 智能分析</p>
            </div>
            <nav class="unified-nav">
                <a href="index.html" class="active">八字排盘</a>
                <a href="liuyao.html">六爻占卜</a>
                <a href="qimen.html">奇门遁甲</a>
                <a href="zeri.html">择日学</a>
                <a href="ai-chat.html">🤖 AI助手</a>
                <a href="http://localhost:8004" target="_blank">📚 知识库</a>
            </nav>
        </div>
    </div>

    <div class="container">

        <div id="aiStatusBanner" class="ai-status-inline">
            <div class="ai-status-main">
                <span id="aiStatusDot" class="ai-status-dot"></span>
                <span id="aiStatusText"></span>
            </div>
            <a href="AI配置指南.md" target="_blank" class="inline-help">配置指南</a>
        </div>

        <div class="card">
            <h2 class="page-title">📅 输入出生信息</h2>
            <form id="baziForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>出生年份</label>
                        <input type="number" id="year" min="1900" max="2100" value="1990" required>
                    </div>
                    <div class="form-group">
                        <label>出生月份</label>
                        <input type="number" id="month" min="1" max="12" value="1" required>
                    </div>
                    <div class="form-group">
                        <label>出生日期</label>
                        <input type="number" id="day" min="1" max="31" value="1" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>出生时辰</label>
                        <input type="number" id="hour" min="0" max="23" value="12" required>
                    </div>
                    <div class="form-group">
                        <label>出生分钟</label>
                        <input type="number" id="minute" min="0" max="59" value="0" required>
                    </div>
                    <div class="form-group">
                        <label>性别</label>
                        <select id="gender" required>
                            <option value="男">男</option>
                            <option value="女">女</option>
                        </select>
                    </div>
                </div>

                <div class="btn-row">
                    <button type="submit" class="btn">🔍 开始排盘</button>
                    <button type="button" class="btn btn-ai" onclick="calculateWithAI()">🤖 AI深度分析</button>
                </div>
            </form>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p class="loading-text">正在计算中...</p>
        </div>

        <div class="result" id="result">
            <div class="card">
                <h2 class="page-title">📊 八字命盘</h2>
                
                <div id="birthInfo" class="info-section">
                    <h3>出生信息</h3>
                    <p id="birthInfoText"></p>
                </div>

                <div class="bazi-display" id="baziDisplay"></div>

                <div class="info-section">
                    <h3>五行分布</h3>
                    <div class="wuxing-chart" id="wuxingChart"></div>
                </div>

                <div class="info-section">
                    <h3>十神关系</h3>
                    <div id="shishenInfo"></div>
                </div>

                <div class="info-section">
                    <h3>大运流程</h3>
                    <div class="dayun-list" id="dayunList"></div>
                </div>

                <div class="info-section">
                    <h3>命理分析</h3>
                    <div id="analysisContent"></div>
                </div>

                <div class="info-section">
                    <h3>📌 基础解读补充</h3>
                    <div id="baseInsightContent"></div>
                </div>

                <div class="info-section">
                    <h3>🎯 格局分析（高级）</h3>
                    <div id="gejuContent"></div>
                </div>

                <div class="info-section">
                    <h3>✨ 神煞吉凶</h3>
                    <div id="shenshaContent"></div>
                </div>

                <div class="info-section">
                    <h3>👨‍👩‍👧‍👦 六亲关系</h3>
                    <div id="liuqinContent"></div>
                </div>

                <div class="info-section" id="aiAnalysisSection" style="display: none;">
                    <h3>🤖 AI深度分析</h3>
                    <div id="aiAnalysisContent" class="analysis-box ai ai-analysis-content"></div>
                </div>

                <div class="disclaimer">
                    ⚠️ 免责声明：本系统仅供参考和娱乐，不应作为人生重大决策的唯一依据。命运掌握在自己手中，积极努力才是改变人生的关键。
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="common-ui.js"></script>
    <script src="markdown.js"></script>
    <script src="api-client.js"></script>
    <script src="ai-status.js"></script>
    <script>
        const esc = (value) => (window.escapeHtml ? window.escapeHtml(value ?? '') : String(value ?? ''));
        const renderMarkdown = (text) => window.renderMarkdownSimple(text, '#1f5f8b');

        const DAY_GAN_TO_WUXING = {
            '甲': '木', '乙': '木', '丙': '火', '丁': '火', '戊': '土',
            '己': '土', '庚': '金', '辛': '金', '壬': '水', '癸': '水'
        };
        const WUXING_ADJUSTMENTS = {
            '木': '可通过阅读、学习、植物环境来扶木。',
            '火': '可通过运动、社交、作息规律来扶火。',
            '土': '可通过稳定节奏、饮食调理与执行计划来扶土。',
            '金': '可通过纪律、结构化工作与技能打磨来扶金。',
            '水': '可通过深度思考、复盘和睡眠管理来扶水。'
        };

        function getBalanceLevel(diff) {
            if (diff < 2) return '平衡';
            if (diff < 4) return '轻度偏颇';
            return '明显偏颇';
        }

        function getDominantElement(wuxingCount) {
            const entries = Object.entries(wuxingCount || {});
            if (!entries.length) {
                return ['未知', 0];
            }
            entries.sort((a, b) => b[1] - a[1]);
            return entries[0];
        }
        const indexAIMonitor = window.createAIStatusMonitor({
            bannerId: 'aiStatusBanner',
            dotId: 'aiStatusDot',
            textId: 'aiStatusText',
            intervalMs: 30000,
            renderStatus: function (state, data, _prev, elements) {
                elements.banner.style.display = 'block';
                if (state === 'available') {
                    elements.banner.classList.add('available');
                    elements.dot.style.background = '#2d8f57';
                    elements.text.textContent = `✓ AI服务正常 (${data.model || '模型信息不可用'})`;
                    elements.text.style.color = '#2d8f57';
                } else if (state === 'degraded') {
                    elements.banner.classList.remove('available');
                    elements.dot.style.background = '#c27c1a';
                    elements.text.textContent = '⚠️ AI服务波动中 - 将自动回退基础分析';
                    elements.text.style.color = '#9c6719';
                } else if (state === 'unconfigured') {
                    elements.banner.classList.remove('available');
                    elements.dot.style.background = '#c27c1a';
                    elements.text.textContent = '⚠️ AI服务未配置 - 点击右侧查看配置指南';
                    elements.text.style.color = '#9c6719';
                } else {
                    elements.banner.classList.remove('available');
                    elements.dot.style.background = '#b94939';
                    elements.text.textContent = '⚠️ 后端连接异常 - 请检查服务状态';
                    elements.text.style.color = '#b94939';
                }
            }
        });
        indexAIMonitor.start();

        document.getElementById('baziForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                year: parseInt(document.getElementById('year').value),
                month: parseInt(document.getElementById('month').value),
                day: parseInt(document.getElementById('day').value),
                hour: parseInt(document.getElementById('hour').value),
                minute: parseInt(document.getElementById('minute').value),
                gender: document.getElementById('gender').value
            };

            // 显示加载动画
            document.getElementById('loading').classList.add('show');
            document.getElementById('result').classList.remove('show');

            try {
                const result = await window.apiClient.postJson('/api/bazi', data);
                displayResult(result.data);
            } catch (error) {
                let errorMsg = '计算失败：' + error.message;
                
                if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                    errorMsg += '\n\n❌ 无法连接到后端服务\n\n解决方法：\n1. 确保后端已启动：./start.sh\n2. 检查端口8002是否被占用\n3. 查看日志：tail -f /tmp/xuanxue-backend.log';
                } else if (error.message.includes('API请求失败')) {
                    errorMsg += '\n\n❌ 服务器返回错误\n\n请查看后端日志了解详情：\ntail -f /tmp/xuanxue-backend.log';
                }
                
                showToast(errorMsg, 'error');
            } finally {
                document.getElementById('loading').classList.remove('show');
            }
        });

        function displayResult(data) {
            // 显示出生信息
            const birthInfo = data.birth_info;
            document.getElementById('birthInfoText').innerHTML = `
                <strong>阳历：</strong>${esc(birthInfo.solar.year)}年${esc(birthInfo.solar.month)}月${esc(birthInfo.solar.day)}日 ${esc(birthInfo.solar.hour)}时${esc(birthInfo.solar.minute)}分<br>
                <strong>农历：</strong>${esc(birthInfo.lunar.year)}年${esc(birthInfo.lunar.month)}月${esc(birthInfo.lunar.day)}日 ${birthInfo.lunar.is_leap ? '(闰月)' : ''}<br>
                <strong>性别：</strong>${esc(birthInfo.gender)}
            `;

            // 显示八字四柱
            const pillars = ['年柱', '月柱', '日柱', '时柱'];
            const baziValues = [data.bazi.year, data.bazi.month, data.bazi.day, data.bazi.hour];
            const baziDisplay = document.getElementById('baziDisplay');
            baziDisplay.innerHTML = '';
            
            pillars.forEach((title, index) => {
                baziDisplay.innerHTML += `
                    <div class="pillar">
                        <div class="pillar-title">${title}</div>
                        <div class="pillar-content">${esc(baziValues[index])}</div>
                    </div>
                `;
            });

            // 显示五行分布
            const wuxingChart = document.getElementById('wuxingChart');
            const wuxingColors = {
                '木': 'wuxing-wood',
                '火': 'wuxing-fire',
                '土': 'wuxing-earth',
                '金': 'wuxing-metal',
                '水': 'wuxing-water'
            };
            wuxingChart.innerHTML = '';
            
            Object.entries(data.wuxing_count).forEach(([element, count]) => {
                wuxingChart.innerHTML += `
                    <div class="wuxing-item ${wuxingColors[element]}">
                        <div>${esc(element)}</div>
                        <div class="count">${count.toFixed(1)}</div>
                    </div>
                `;
            });

            // 显示十神
            const shishenInfo = document.getElementById('shishenInfo');
            shishenInfo.innerHTML = `
                <div class="shishen-grid">
                    <div class="shishen-item"><strong>年干：</strong>${esc(data.shishen.year_gan)}</div>
                    <div class="shishen-item"><strong>月干：</strong>${esc(data.shishen.month_gan)}</div>
                    <div class="shishen-item"><strong>日干：</strong>${esc(data.shishen.day_gan)}（命主）</div>
                    <div class="shishen-item"><strong>时干：</strong>${esc(data.shishen.hour_gan)}</div>
                </div>
            `;

            // 显示大运
            const dayunList = document.getElementById('dayunList');
            dayunList.innerHTML = '';
            data.dayun.forEach(dayun => {
                dayunList.innerHTML += `
                    <div class="dayun-item">
                        <div class="dayun-ganzhi">${esc(dayun.ganzhi)}</div>
                        <div class="dayun-age">${esc(dayun.start_age)}-${esc(dayun.end_age)}岁</div>
                    </div>
                `;
            });

            // 显示分析
            const analysis = data.analysis;
            const analysisContent = document.getElementById('analysisContent');
            analysisContent.innerHTML = `
                <div class="analysis-box info">
                    <h4>五行概况</h4>
                    <p>${esc(analysis.wuxing_summary)}</p>
                </div>
                
                <div class="analysis-box success">
                    <h4>最旺五行：${esc(analysis.strong_element.element)}</h4>
                    <p>${esc(analysis.strong_element.advice)}</p>
                </div>
                
                <div class="analysis-box warn">
                    <h4>最弱五行：${esc(analysis.weak_element.element)}</h4>
                    <p>${esc(analysis.weak_element.advice)}</p>
                </div>
                
                <div class="analysis-box">
                    <h4>平衡建议</h4>
                    <p>${esc(analysis.balance_advice)}</p>
                </div>
                
                <p class="text-muted light-note">${esc(analysis.disclaimer)}</p>
            `;

            // 显示基础补充解读（非AI）
            const wuxingEntries = Object.entries(data.wuxing_count || {}).sort((a, b) => b[1] - a[1]);
            const topElement = wuxingEntries[0] || ['未知', 0];
            const weakElement = wuxingEntries[wuxingEntries.length - 1] || ['未知', 0];
            const totalWuxing = wuxingEntries.reduce((sum, item) => sum + Number(item[1] || 0), 0);
            const avgWuxing = wuxingEntries.length ? totalWuxing / wuxingEntries.length : 0;
            const gap = Number((topElement[1] - weakElement[1]).toFixed(2));
            const dayMasterGan = (data.bazi && data.bazi.day ? String(data.bazi.day).charAt(0) : '');
            const dayMasterElement = DAY_GAN_TO_WUXING[dayMasterGan] || '未知';
            const dominantNayin = getDominantElement(data.wuxing_count || {})[0];
            const baseInsight = document.getElementById('baseInsightContent');

            baseInsight.innerHTML = `
                <div class="metric-grid">
                    <div class="metric-item">
                        <div class="metric-label">平衡等级</div>
                        <div class="metric-value">${esc(getBalanceLevel(gap))}</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-label">五行最大差值</div>
                        <div class="metric-value">${esc(gap.toFixed(2))}</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-label">日主五行</div>
                        <div class="metric-value">${esc(dayMasterGan)} · ${esc(dayMasterElement)}</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-label">命局主导元素</div>
                        <div class="metric-value">${esc(dominantNayin)}</div>
                    </div>
                </div>
                <div class="analysis-box info">
                    <h4>调衡优先级</h4>
                    <p>${wuxingEntries.map(([element, count], idx) => `${idx + 1}. ${esc(element)}(${Number(count).toFixed(1)})`).join(' ｜ ')}</p>
                </div>
                <div class="analysis-box warn">
                    <h4>传统补益方向</h4>
                    <p><strong>${esc(weakElement[0])}</strong>偏弱，${esc(WUXING_ADJUSTMENTS[weakElement[0]] || '建议以作息和节奏管理为先。')}</p>
                    <p class="text-muted">均衡参考值约为 ${avgWuxing.toFixed(1)}，当前最大偏差为 ${gap.toFixed(2)}。</p>
                </div>
                <div class="analysis-box success">
                    <h4>纳音提示</h4>
                    <p>年柱：${esc(data.nayin.year)} ｜ 月柱：${esc(data.nayin.month)} ｜ 日柱：${esc(data.nayin.day)} ｜ 时柱：${esc(data.nayin.hour)}</p>
                </div>
            `;

            // 显示高级分析
            if (data.advanced_analysis) {
                const adv = data.advanced_analysis;
                
                // 格局分析
                const geju = adv.geju;
                document.getElementById('gejuContent').innerHTML = `
                    <div class="analysis-box success">
                        <h4>命局强弱：${esc(geju.strength_level)} (${esc(geju.strength.toFixed(2))})</h4>
                        <p><strong>格局类型：</strong>${esc(geju.pattern_type)}</p>
                        <p class="light-note">${esc(geju.pattern_description)}</p>
                    </div>
                    <div class="analysis-box warn">
                        <h4>适合职业</h4>
                        <p>${(geju.suitable_career || []).map(item => esc(item)).join('、')}</p>
                    </div>
                    <div class="analysis-box info">
                        <h4>人生建议</h4>
                        <p>${esc(geju.life_advice)}</p>
                    </div>
                `;
                
                // 神煞分析
                const shensha = adv.shensha;
                let shenshaHTML = `<p><strong>${esc(shensha.summary)}</strong></p>`;
                if (shensha.shensha_list && shensha.shensha_list.length > 0) {
                    shensha.shensha_list.forEach(item => {
                        const statusClass = item.type === '大吉'
                            ? 'success'
                            : item.type === '吉'
                                ? 'info'
                                : 'warn';
                        shenshaHTML += `
                            <div class="analysis-box ${statusClass}">
                                <h4>${esc(item.name)} <span class="tag">${esc(item.type)}</span></h4>
                                <p>${esc(item.description)}</p>
                            </div>
                        `;
                    });
                } else {
                    shenshaHTML += '<p class="text-muted">命局中暂无明显神煞，属于平和之象。</p>';
                }
                document.getElementById('shenshaContent').innerHTML = shenshaHTML;
                
                // 六亲分析
                const liuqin = adv.liuqin;
                document.getElementById('liuqinContent').innerHTML = `
                    <div class="analysis-box">
                        <h4>👨 父亲</h4>
                        <p>${esc(liuqin.father)}</p>
                    </div>
                    <div class="analysis-box">
                        <h4>👩 母亲</h4>
                        <p>${esc(liuqin.mother)}</p>
                    </div>
                    <div class="analysis-box">
                        <h4>👫 兄弟姐妹</h4>
                        <p>${esc(liuqin.siblings)}</p>
                    </div>
                    <div class="analysis-box">
                        <h4>💑 配偶</h4>
                        <p>${esc(liuqin.spouse)}</p>
                    </div>
                    <div class="analysis-box">
                        <h4>👶 子女</h4>
                        <p>${esc(liuqin.children)}</p>
                    </div>
                `;
            }

            // 显示AI分析（如果有）
            if (data.ai_analysis) {
                document.getElementById('aiAnalysisSection').style.display = 'block';
                document.getElementById('aiAnalysisContent').innerHTML = renderMarkdown(data.ai_analysis);
            } else {
                document.getElementById('aiAnalysisSection').style.display = 'none';
            }

            // 显示结果
            document.getElementById('result').classList.add('show');
            
            // 滚动到结果
            document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
        }

        // AI深度分析函数
        async function calculateWithAI() {
            const data = {
                year: parseInt(document.getElementById('year').value),
                month: parseInt(document.getElementById('month').value),
                day: parseInt(document.getElementById('day').value),
                hour: parseInt(document.getElementById('hour').value),
                minute: parseInt(document.getElementById('minute').value),
                gender: document.getElementById('gender').value
            };

            // 显示加载动画
            document.getElementById('loading').classList.add('show');
            document.getElementById('loading').querySelector('p').textContent = '正在进行AI深度分析，请稍候...';
            document.getElementById('result').classList.remove('show');

            try {
                const result = await window.apiClient.postJson('/api/ai/enhance-bazi', data);

                if (!result.ai_enhanced && result.ai_message) {
                    showToast(result.ai_message, 'warn');
                }
                
                displayResult(result.data);
                
                // 如果有AI分析，滚动到AI分析部分
                if (result.data.ai_analysis) {
                    setTimeout(() => {
                        document.getElementById('aiAnalysisSection').scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 500);
                }
            } catch (error) {
                let errorMsg = 'AI分析失败：' + error.message;
                
                if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                    errorMsg += '\n\n❌ 无法连接到后端服务\n\n解决方法：\n1. 确保后端已启动：./start.sh\n2. 检查端口8002是否被占用';
                } else {
                    errorMsg += '\n\n请确保：\n1. 后端服务已启动\n2. 已配置ARK_API_KEY环境变量\n\n配置方法见《AI配置指南.md》';
                }
                
                showToast(errorMsg, 'error');
            } finally {
                document.getElementById('loading').classList.remove('show');
                document.getElementById('loading').querySelector('p').textContent = '正在计算中...';
            }
        }
    </script>
</body>
</html>
