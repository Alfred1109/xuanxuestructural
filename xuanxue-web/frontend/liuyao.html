<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六爻占卜 - 玄学预测系统</title>
    <link rel="stylesheet" href="common-header.css">
    <link rel="stylesheet" href="common-theme.css">
    <style>
        .page-title {
            margin-bottom: 16px;
            color: #1f5f8b;
        }

        .tips {
            background: #edf6fc;
            border-left: 4px solid #2474a7;
            padding: 12px;
            margin-bottom: 18px;
            border-radius: 8px;
        }

        .btn-row .btn {
            flex: 1;
        }

        .gua-display {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin: 18px 0;
            flex-wrap: wrap;
        }

        .gua-card {
            background: linear-gradient(135deg, #2a6c8a 0%, #1f5f8b 100%);
            padding: 20px;
            border-radius: 12px;
            color: #fff;
            text-align: center;
            min-width: 220px;
        }

        .gua-card.hidden {
            display: none;
        }

        .gua-name {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .gua-info {
            font-size: 14px;
            opacity: 0.93;
        }

        .yao-display {
            display: flex;
            flex-direction: column-reverse;
            gap: 8px;
            margin: 12px 0;
        }

        .yao-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            background: #ffffff;
            border-radius: 8px;
            border: 1px solid #d6e2ec;
        }

        .yao-item.dong {
            background: #fff8ed;
            border-color: #e7c692;
        }

        .yao-symbol {
            font-size: 24px;
            margin-right: 15px;
            min-width: 40px;
            color: #1f5f8b;
        }

        .yao-details {
            flex: 1;
        }

        .dong-mark {
            color: #b97f2e;
            font-weight: 600;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }

        @media (max-width: 768px) {
            .gua-card {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- 统一的顶部通栏 -->
    <div class="unified-header">
        <div class="container">
            <div class="site-title">
                <h1>🔮 玄学预测系统</h1>
                <p>传统命理学 · 现代科技 · 智能分析</p>
            </div>
            <nav class="unified-nav">
                <a href="index.html">八字排盘</a>
                <a href="liuyao.html" class="active">六爻占卜</a>
                <a href="qimen.html">奇门遁甲</a>
                <a href="zeri.html">择日学</a>
                <a href="ai-chat.html">🤖 AI助手</a>
                <a href="http://localhost:8004" target="_blank">📚 知识库</a>
            </nav>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div class="ai-status-banner" id="aiStatusBanner">
                <span class="ai-status-dot" id="aiStatusDot"></span>
                <strong id="aiStatusText">正在检查AI状态...</strong>
                <span class="ai-status-meta" id="aiStatusDetail"></span>
            </div>

            <div class="tips">
                <strong>💡 占卜须知：</strong><br>
                1. 心诚则灵，占卜前请静心思考您的问题<br>
                2. 问题要具体明确，避免模糊不清<br>
                3. 同一问题不宜反复占卜<br>
                4. 占卜结果仅供参考，不可过分依赖
            </div>

            <h2 class="page-title">🔮 请输入您的问题</h2>
            <form id="liuyaoForm">
                <div class="form-group">
                    <label>占卜问题（可选，但建议填写以获得更准确的解读）</label>
                    <textarea id="question" placeholder="例如：近期事业发展如何？感情运势怎样？投资是否顺利？等等..."></textarea>
                </div>

                <div class="btn-row">
                    <button type="submit" class="btn">🎲 开始占卜</button>
                    <button type="button" class="btn btn-ai" onclick="divineWithAI()">🤖 AI深度解读</button>
                </div>
            </form>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p class="loading-text">正在摇卦中...</p>
        </div>

        <div class="result" id="result">
            <div class="card">
                <h2 class="page-title">📊 卦象结果</h2>
                
                <div class="info-section">
                    <h3>占卜信息</h3>
                    <p><strong>问题：</strong><span id="questionText"></span></p>
                    <p><strong>时间：</strong><span id="timeText"></span></p>
                </div>

                <div class="gua-display">
                    <div class="gua-card">
                        <div class="gua-name" id="benguaName"></div>
                        <div class="gua-info">
                            <div id="benguaInfo"></div>
                        </div>
                    </div>
                    <div class="gua-card hidden" id="bianguaCard">
                        <div class="gua-name" id="bianguaName"></div>
                        <div class="gua-info">变卦</div>
                    </div>
                </div>

                <div class="info-section">
                    <h3>爻象详情</h3>
                    <div class="yao-display" id="yaoDisplay"></div>
                </div>

                <div class="info-section">
                    <h3>卦象解释</h3>
                    <div id="interpretationContent"></div>
                </div>

                <div class="info-section">
                    <h3>📐 卦象结构分析</h3>
                    <div id="structureContent"></div>
                </div>

                <div class="disclaimer">
                    ⚠️ 免责声明：占卜结果仅供参考，不应作为决策的唯一依据。人生在于努力，命运掌握在自己手中。
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="common-ui.js"></script>
    <script src="markdown.js"></script>
    <script src="api-client.js"></script>
    <script src="ai-status.js"></script>
    <script>
        const esc = (value) => (window.escapeHtml ? window.escapeHtml(value ?? '') : String(value ?? ''));

        const renderMarkdown = (text) => window.renderMarkdownSimple(text, '#1f5f8b');
        const SHENG_MAP = { '木': '火', '火': '土', '土': '金', '金': '水', '水': '木' };
        const KE_MAP = { '木': '土', '土': '水', '水': '火', '火': '金', '金': '木' };

        function isConnectivityError(error) {
            const msg = String((error && error.message) || '');
            return msg.includes('Failed to fetch') || msg.includes('NetworkError') || msg.includes('无法连接');
        }

        function getWuxingRelation(upper, lower) {
            if (upper === lower) {
                return '上下同气，主事态内外一致，执行阻力较小。';
            }
            if (SHENG_MAP[upper] === lower) {
                return `上卦${upper}生下卦${lower}，外部条件可滋养当前局面。`;
            }
            if (SHENG_MAP[lower] === upper) {
                return `下卦${lower}生上卦${upper}，基础较稳，后续发展有承托。`;
            }
            if (KE_MAP[upper] === lower) {
                return `上卦${upper}克下卦${lower}，易出现外压，需要稳住节奏。`;
            }
            if (KE_MAP[lower] === upper) {
                return `下卦${lower}克上卦${upper}，内在因素较强，注意方向一致。`;
            }
            return '上下卦关系中性，建议结合动爻与问题背景综合判断。';
        }

        function getActionHint(movingCount) {
            if (movingCount === 0) {
                return '动爻为0，局面偏稳，适合先巩固基础再推进。';
            }
            if (movingCount <= 2) {
                return '动爻较少，重点盯住关键变化点，避免分散投入。';
            }
            return '动爻较多，局势波动明显，建议分阶段执行并设置缓冲方案。';
        }

        function buildStructureInsight(guaInfo) {
            const yaoDetails = guaInfo.yao_details || [];
            const moving = yaoDetails.filter((item) => item.is_dong);
            const yinCount = yaoDetails.filter((item) => item.type === '阴爻').length;
            const yangCount = yaoDetails.length - yinCount;
            const wuxingCount = {};
            yaoDetails.forEach((item) => {
                wuxingCount[item.wuxing] = (wuxingCount[item.wuxing] || 0) + 1;
            });
            const wuxingRank = Object.entries(wuxingCount).sort((a, b) => b[1] - a[1]);
            const dominant = wuxingRank[0] || ['未知', 0];
            const upper = guaInfo.bengua.shang_gua.wuxing;
            const lower = guaInfo.bengua.xia_gua.wuxing;

            return `
                <div class="summary-grid">
                    <div class="metric-item">
                        <div class="metric-label">动爻数量</div>
                        <div class="metric-value">${moving.length} / 6</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-label">阴阳比例</div>
                        <div class="metric-value">阳 ${yangCount} : 阴 ${yinCount}</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-label">主导五行</div>
                        <div class="metric-value">${esc(dominant[0])} (${esc(dominant[1])} 爻)</div>
                    </div>
                </div>
                <div class="analysis-box info">
                    <h4>变化强度</h4>
                    <p>${moving.length ? `动爻位于第 ${moving.map((x) => x.position).join('、')} 爻。` : '本卦无动爻。'} ${getActionHint(moving.length)}</p>
                </div>
                <div class="analysis-box warn">
                    <h4>五行分布</h4>
                    <p>${wuxingRank.map((item) => `${esc(item[0])}:${esc(item[1])}`).join(' ｜ ') || '暂无数据'}</p>
                </div>
                <div class="analysis-box success">
                    <h4>上下卦关系</h4>
                    <p>上卦${esc(guaInfo.bengua.shang_gua.name)}（${esc(upper)}）/ 下卦${esc(guaInfo.bengua.xia_gua.name)}（${esc(lower)}）</p>
                    <p>${esc(getWuxingRelation(upper, lower))}</p>
                </div>
            `;
        }

        const aiMonitor = window.createAIStatusMonitor({
            bannerId: 'aiStatusBanner',
            dotId: 'aiStatusDot',
            textId: 'aiStatusText',
            detailId: 'aiStatusDetail',
            onTransition: function (state) {
                if (state === 'unconfigured') {
                    showToast('AI服务未配置，当前仅可使用基础解读', 'warn');
                } else if (state === 'degraded') {
                    showToast('AI服务波动中，将自动回退基础解读', 'warn');
                } else if (state === 'offline') {
                    showToast('后端连接异常，请检查服务状态', 'error');
                }
            }
        });
        aiMonitor.start();

        document.getElementById('liuyaoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const question = document.getElementById('question').value.trim() || '未指定问题';

            // 显示加载动画
            document.getElementById('loading').classList.add('show');
            document.getElementById('result').classList.remove('show');

            try {
                const result = await window.apiClient.post('/api/divination/liuyao', { question });
                displayResult(result.data);
            } catch (error) {
                if (isConnectivityError(error)) {
                    aiMonitor.applyState('offline', {});
                }
                showToast('占卜失败：' + error.message + '\n\n请确保后端服务已启动', 'error');
            } finally {
                document.getElementById('loading').classList.remove('show');
            }
        });

        async function divineWithAI() {
            const question = document.getElementById('question').value.trim() || '未指定问题';

            // 显示加载动画
            document.getElementById('loading').classList.add('show');
            document.getElementById('loading').querySelector('p').textContent = '正在进行AI深度解读...';
            document.getElementById('result').classList.remove('show');

            try {
                const result = await window.apiClient.post('/api/ai/enhance-liuyao', { question });

                if (!result.ai_enhanced && result.ai_message) {
                    if (result.ai_enabled) {
                        aiMonitor.applyState('degraded', { message: result.ai_message });
                    } else {
                        aiMonitor.applyState('unconfigured', { message: result.ai_message });
                    }
                    showToast(result.ai_message, 'warn');
                } else if (result.ai_enhanced) {
                    aiMonitor.applyState('available', {});
                }
                
                displayResult(result.data, !!result.ai_enhanced);
            } catch (error) {
                if (error.message.includes('AI服务未配置')) {
                    aiMonitor.applyState('unconfigured', { message: error.message });
                } else if (error.message.includes('AI服务暂时不可用')) {
                    aiMonitor.applyState('degraded', { message: error.message });
                } else if (isConnectivityError(error)) {
                    aiMonitor.applyState('offline', {});
                }
                showToast('占卜失败：' + error.message + '\n\n请确保后端服务已启动', 'error');
            } finally {
                document.getElementById('loading').classList.remove('show');
                document.getElementById('loading').querySelector('p').textContent = '正在摇卦中...';
            }
        }

        function displayResult(data, hasAI = false) {
            const safeData = data || {};
            // 显示问题和时间
            document.getElementById('questionText').textContent = safeData.question || '未指定问题';
            document.getElementById('timeText').textContent = safeData.timestamp || '未知时间';

            const guaInfo = safeData.gua_info || {
                bengua: {
                    name: '未知卦',
                    shang_gua: { name: '-', symbol: '', nature: '-' },
                    xia_gua: { name: '-', symbol: '', nature: '-' }
                },
                biangua: { name: '无变卦' },
                dongyao: [],
                yao_details: []
            };
            
            // 显示本卦
            document.getElementById('benguaName').textContent = guaInfo.bengua.name;
            document.getElementById('benguaInfo').innerHTML = `
                本卦<br>
                上卦：${esc(guaInfo.bengua.shang_gua.name)}${esc(guaInfo.bengua.shang_gua.symbol)} (${esc(guaInfo.bengua.shang_gua.nature)})<br>
                下卦：${esc(guaInfo.bengua.xia_gua.name)}${esc(guaInfo.bengua.xia_gua.symbol)} (${esc(guaInfo.bengua.xia_gua.nature)})
            `;

            // 显示变卦（如果有动爻）
            if (guaInfo.dongyao && guaInfo.dongyao.length > 0) {
                document.getElementById('bianguaCard').classList.remove('hidden');
                document.getElementById('bianguaName').textContent = guaInfo.biangua.name;
            } else {
                document.getElementById('bianguaCard').classList.add('hidden');
            }

            // 显示爻象
            const yaoDisplay = document.getElementById('yaoDisplay');
            yaoDisplay.innerHTML = '';
            
            (guaInfo.yao_details || []).forEach(yao => {
                const isDong = yao.is_dong;
                const symbol = yao.type === '阳爻' ? '━━━━━' : '━━  ━━';
                
                yaoDisplay.innerHTML += `
                    <div class="yao-item ${isDong ? 'dong' : ''}">
                        <div class="yao-symbol">${esc(symbol)}</div>
                        <div class="yao-details">
                            <strong>${esc(yao.name)}</strong> - ${esc(yao.type)} (${esc(yao.wuxing)})
                            ${isDong ? ' <span class="dong-mark">●动爻</span>' : ''}
                        </div>
                    </div>
                `;
            });

            // 显示解释
            const interp = safeData.interpretation || {};
            let interpretationHTML = `
                <div class="analysis-box success">
                    <h4>卦象总结</h4>
                    <p>${esc(interp.summary || '暂无')}</p>
                </div>
                
                <div class="analysis-box info">
                    <h4>详细分析</h4>
                    <p>${esc(interp.detailed || '暂无')}</p>
                </div>
                
                <div class="analysis-box warn">
                    <h4>建议</h4>
                    <p>${esc(interp.advice || '暂无')}</p>
                </div>
                
                <div class="analysis-box">
                    <h4>时间预测</h4>
                    <p>${esc(interp.timing || '暂无')}</p>
                </div>
            `;

            // 如果有AI解读，添加AI解读部分
            if (hasAI && safeData.ai_interpretation) {
                interpretationHTML += `
                    <div class="analysis-box ai">
                        <h4>🤖 AI深度解读</h4>
                        <div>${renderMarkdown(safeData.ai_interpretation)}</div>
                    </div>
                `;
            }

            document.getElementById('interpretationContent').innerHTML = interpretationHTML;
            document.getElementById('structureContent').innerHTML = buildStructureInsight(guaInfo);

            // 显示结果
            document.getElementById('result').classList.add('show');
            
            // 滚动到结果
            document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
